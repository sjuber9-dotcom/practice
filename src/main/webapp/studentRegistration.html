<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1d2671, #c33764);
    font-family: Arial, sans-serif;
}

.register-box {
    width: 420px;
    padding: 30px;
    background: rgba(255,255,255,0.25);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 12px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
}

.gender-group {
    display: flex;
    gap: 15px;
    margin-top: 5px;
}

.gender-group label {
    font-weight: normal;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #ff9800;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>
<div class="register-box">
    <h2>Student Registration</h2>

    <form action="registerStudent" method="post">

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="sname" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Mobile</label>
            <input type="text" name="mobile" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="gender-group">
                <label><input type="radio" name="gender" value="Male"> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
            </div>
        </div>

        <div class="form-group">
            <label>Course</label>
            <select name="course">
                <option>Java</option>
                <option>Python</option>
                <option>Web</option>
            </select>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address">
        </div>

        <button type="submit">Register</button>
    </form>
</div>
</body>
</html>
