<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1d2671, #c33764);
    font-family: Arial, sans-serif;
}

.login-box {
    width: 360px;
    padding: 30px;
    background: rgba(255,255,255,0.25);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

.login-btn {
    background: #ff9800;
    color: white;
}

.register-btn {
    background: #4caf50;
    color: white;
}
</style>
</head>

<body>
<div class="login-box">
    <h2>User Login</h2>

    <form action="login" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="uname" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="pass" required>
        </div>

        <button class="login-btn" type="submit">Login</button>
    </form>

    <form action="studentRegistration.html" method="get">
        <button class="register-btn" type="submit">
            New Student Registration
        </button>
    </form>
</div>
</body>
</html>
